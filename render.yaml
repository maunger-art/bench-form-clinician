# Render Blueprint for the Benchmark PS landing site + blog.
# The build produces the Vite SPA into dist/ and copies the pre-built static blog
# (output/, committed by the blog engine) into dist/blog, so the whole thing deploys
# as one static site at benchmarkps.org — with the blog live at /blog.
#
# NOTE: if this service was created manually in the dashboard (not from a Blueprint),
# Render may ignore this file. In that case the package.json "build" change alone still
# publishes the blog (the dashboard build command runs `build`, which now copies output/
# into dist/blog). The routes below document the one rule the dashboard must also have:
# a single SPA rewrite of /* -> /index.html. Render serves real files first, so
# /blog and /blog/posts/... resolve to the static blog before that fallback applies.
services:
  - type: web
    name: bench-form-clinician
    runtime: static
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
