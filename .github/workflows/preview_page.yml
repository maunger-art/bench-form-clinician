name: Refresh Preview Page

on:
  schedule:
    # Every Monday at 07:00 UTC — refresh the preview page for the week
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-preview:
    name: Refresh Weekly Preview Page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate preview page
        run: python generate_preview_page.py

      - name: Commit and push
        run: |
          git config user.name "Benchmark PS Bot"
          git config user.email "bot@benchmarkps.org"
          git add output/preview/
          git commit -m "Weekly preview page: $(date +%Y-%m-%d)" || echo "No changes"
          git push
