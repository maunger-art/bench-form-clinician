name: Process Feedback

on:
  schedule:
    # Every Wednesday at 07:00 UTC
    - cron: "0 7 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-feedback:
    name: Process Email Feedback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Process feedback
        run: python process_feedback.py

      - name: Commit changes
        run: |
          git config user.name "Benchmark PS Bot"
          git config user.email "bot@benchmarkps.org"
          git add queue.json feedback.json feedback_log.json
          git commit -m "Process feedback: $(date +%Y-%m-%d)" || echo "No feedback to process"
          git push
